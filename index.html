<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 氣象小偵探！測出你的水系守護神 💧</title>
    <style>
        :root {
            --bg-color: #e3f2fd;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --btn-border: #bdc3c7;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            color: var(--text-color);
            margin: 0;
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .quiz-container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.12);
            max-width: 800px;
            width: 100%;
            text-align: center;
            border: 4px solid #90caf9;
            box-sizing: border-box;
        }

        h1 {
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 10px;
            color: #2980b9;
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 12px;
            width: 100%;
            background-color: #eceff1;
            border-radius: 6px;
            margin-bottom: 35px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3498db, #2ecc71);
            transition: width 0.3s ease;
        }

        .question {
            font-size: 24px;
            margin-bottom: 35px;
            font-weight: bold;
            color: #2c3e50;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* 關鍵修改：2x2 網格版面 */
        .options-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        /* 大按鈕設計，方便平板點擊 */
        .option-btn {
            background-color: #f8f9fa;
            color: var(--text-color);
            border: 3px solid var(--btn-border);
            padding: 20px;
            border-radius: 16px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            line-height: 1.4;
            transition: all 0.2s ease;
            box-sizing: border-box;
            
            /* 讓文字在按鈕內上下左右完美居中 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 110px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* 點擊與懸停效果 */
        .option-btn:hover, .option-btn:active {
            background-color: #e1f5fe;
            border-color: var(--accent-color);
            color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.2);
        }

        .result-section {
            display: none;
        }

        .god-name {
            font-size: 32px;
            color: #2980b9;
            margin: 20px 0;
            font-weight: bold;
        }

        .god-origin {
            display: inline-block;
            font-size: 16px;
            background-color: #ffe082;
            color: #5d4037;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .god-desc {
            font-size: 18px;
            line-height: 1.7;
            text-align: left;
            background-color: #f1f8ff;
            padding: 25px;
            border-radius: 16px;
            margin-top: 20px;
            border-left: 6px solid #3498db;
        }

        .restart-btn {
            margin-top: 30px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .restart-btn:hover {
            transform: scale(1.02);
        }

        /* 響應式手機備用：如果螢幕真的太小才變回單排 */
        @media (max-width: 600px) {
            .options-list {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            .option-btn {
                min-height: 80px;
                font-size: 16px;
                padding: 12px;
            }
            h1 { font-size: 24px; }
            .question { font-size: 18px; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-section">
        <h1>💧 氣象小偵探！ 💧</h1>
        <div class="subtitle">歡迎來到水神召喚儀式！回答 8 個問題就能找出你的守護神喔！</div>
        
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>

        <div class="question" id="question-text">正在載入召喚地圖...</div>
        <div class="options-list" id="options-container"></div>
    </div>

    <div id="result-section" class="result-section">
        <h1>🔮 召喚成功！ 🔮</h1>
        <p style="font-size: 18px;">最適合你的水系守護神就是：</p>
        <div class="god-name" id="god-name">水神名稱</div>
        <div class="god-origin" id="god-origin">起源</div>
        <div class="god-desc" id="god-desc">描述</div>
        <button class="restart-btn" onclick="restartQuiz()">再玩一次 🔄</button>
    </div>
</div>

<script>
    // 題目與選項資料庫
    const questions = [
        {
            q: "1. 早上起床看到外面正在下小雨，你的心情通常會怎麼樣？",
            options: [
                { text: "覺得心裡很安靜，想待在教室看書或畫畫。", score: { taiwan: 2, china: 1 } },
                { text: "有點小無聊，看著窗外發呆。", score: { nordic: 2 } },
                { text: "沒差啦！還是可以跟同學聊天、開心地玩！", score: { greece: 2, maya: 1 } },
                { text: "太棒了！花草樹木有水喝，會長得很高喔！", score: { maya: 2, india: 1 } }
            ]
        },
        {
            q: "2. 如果可以選擇一個有水的地方去大冒險，你想去哪裡？",
            options: [
                { text: "有大風大浪、很大很神祕的大海。", score: { greece: 2, nordic: 1 } },
                { text: "山裡面亮晶晶的小溪流，或是漂亮的瀑布。", score: { taiwan: 2 } },
                { text: "古老叢林裡、地底下的祕密水洞。", score: { maya: 2 } },
                { text: "一條好長好長、養活很多小動物的大江河。", score: { china: 2, india: 1 } }
            ]
        },
        {
            q: "3. 【氣象小知識】天上的「雲」到底是怎麼形成的呢？",
            options: [
                { text: "地面空氣上升「膨脹冷卻」，水氣變成小水滴！", score: { india: 2, china: 1, taiwan: 1 } },
                { text: "地面空氣上升「膨脹加熱」，把天空燒出白煙了。", score: { greece: 1 } },
                { text: "太陽太大把天空曬融化，變成白白的一團。", score: { maya: 1 } },
                { text: "天上的風太無聊，把棉花糖吹散在空中。", score: { nordic: 1 } }
            ]
        },
        {
            q: "4. 如果跟同學吵架，或者心情很不好的時候，你會怎麼辦？",
            options: [
                { text: "像大風暴一樣直接生氣，大聲說出我不高興！", score: { greece: 2, nordic: 1 } },
                { text: "先忍耐一下下，等冷記了再想辦法解決。", score: { china: 2, india: 1 } },
                { text: "不想吵架，跟對方好好說，手牽手和好。", score: { taiwan: 2, maya: 1 } },
                { text: "找老師或聰明的同學幫忙想好辦法。", score: { india: 2 } }
            ]
        },
        {
            q: "5. 【氣象小知識】關於常聽到的「聖嬰現象」，下面哪一個正確？",
            options: [
                { text: "會讓太平洋東邊的海水異常變溫暖。", score: { taiwan: 1 } },
                { text: "會讓全球天氣變奇怪，有些地方旱災、有些淹水。", score: { greece: 1 } },
                { text: "西班牙語意思是「小男孩」，常在聖誕節前後發生。", score: { maya: 1 } },
                { text: "以上說法都完全正確！太厲害了！", score: { india: 2, china: 2, nordic: 1 } }
            ]
        },
        {
            q: "6. 在班上分組玩遊戲或做海報時，你最喜歡扮演哪種角色？",
            options: [
                { text: "大隊長：帶領大家往前衝，很有點子跟活力！", score: { greece: 2, nordic: 1 } },
                { text: "小幫手：默默幫忙拿東西、照顧需要幫助的同學。", score: { taiwan: 2, china: 1 } },
                { text: "智多星：冷靜觀察，總能幫大家想到好辦法。", score: { india: 2 } },
                { text: "開心果：講笑話逗大家開心，讓氣氛變很好！", score: { maya: 2 } }
            ]
        },
        {
            q: "7. 【氣象小知識】為什麼「全球暖化」地球變燙時，大雨反而變更強？",
            options: [
                { text: "因為氣溫變高，空氣像變大的水袋，能裝更多水氣。", score: { taiwan: 1 } },
                { text: "地球變熱讓海水蒸發變快，天上的水氣變得超多。", score: { china: 1 } },
                { text: "當這麼多水氣一口氣倒下來，就會變成大暴雨。", score: { greece: 1 } },
                { text: "以上全都是原因喔！氣象小達人就是你！", score: { india: 2, china: 2, maya: 1 } }
            ]
        },
        {
            q: "8. 你覺得「雨水」對人類和小動物來說，最重要的意義是什麼？",
            options: [
                { text: "可以幫忙洗乾淨大自然，讓心情變好。", score: { india: 1, taiwan: 1 } },
                { text: "讓農田的稻米和蔬菜長大，讓我們有飯吃！", score: { maya: 2, china: 1 } },
                { text: "大自然展現很酷、很有力量的一面（像打雷）。", score: { greece: 2, nordic: 1 } },
                { text: "是地球的奇妙循環，有下雨才會有好喝的水。", score: { taiwan: 2, china: 1 } }
            ]
        }
    ];

    // 水神結果資料庫
    const gods = {
        taiwan: {
            name: "大自然小精靈 ── 台灣原住民河神",
            origin: "台灣原住民大自然信仰",
            desc: "【你是溫柔的水精靈】你是一個非常有愛心、熱愛大自然的小朋友。你就像森林裡乾淨的小溪流，總是體貼別人、不喜歡吵架。大家都覺得跟你在一起很舒服喔！守護精靈建議你多去公園散步、抱抱大樹，你會更有活力！"
        },
        china: {
            name: "神氣的指揮官 ── 四海龍王",
            origin: "華夏神話故事",
            desc: "【你是沉穩的小隊長】你很有禮貌、也很守規矩。雖然你平常不一定大聲講話，但你就像龍王一樣，只要認真起來，就能做好厲害的大事！只要你像累積雨水一樣慢慢努力，以後一定會成為很棒的領袖喔！"
        },
        greece: {
            name: "超級冒險王 ── 海神波賽頓",
            origin: "希臘神話故事",
            desc: "【你是充滿活力的大力士】你的靈魂像大海一樣有無窮無盡的活力！你敢挑戰好玩的新事物，脾氣來得快、去得也快，看到不公平的事情會勇敢站出來。手持三叉戟的海神會送你滿滿的勇氣，讓你打敗所有困難！"
        },
        nordic: {
            name: "不服輸的冰雪戰士 ── 北歐大洋神",
            origin: "北歐神話故事",
            desc: "【你是勇敢的小戰士】你帶有一點酷酷的、神祕的感覺，而且非常勇敢！就算遇到困難（像考試不會寫、賽跑跌倒），你也不會哭哭，而是會自己站起來繼續努力。風暴過後的大晴天，就是你最棒的禮物！"
        },
        maya: {
            name: "快樂小幫手 ── 瑪雅雨神查克",
            origin: "中美洲瑪雅神話",
            desc: "【你是大家的快樂泉源】在古時候，農夫最喜歡雨神了，因為祂一來就會帶給大地食物和生機！你也是這樣的人，樂觀開朗，走到哪裡都能讓大家笑嘻嘻。你就像及時雨一樣，常常在同學無聊或難過時帶來快樂！"
        },
        india: {
            name: "班上的智多星 ── 水之國王伐樓拿",
            origin: "印度古神話",
            desc: "【你是聰明的小博士】你在這次測驗中答對了好多氣象科學題喔！你的頭腦非常冷靜，做事情有條有理，就像清澈見底的湖水一樣。同學遇到不會的題目，常常想聽聽你的意見。繼續保持愛思考的好習慣吧！"
        }
    };

    let currentQuestionIndex = 0;
    let totalScores = { taiwan: 0, china: 0, greece: 0, nordic: 0, maya: 0, india: 0 };

    function loadQuestion() {
        const quizSection = document.getElementById('quiz-section');
        const resultSection = document.getElementById('result-section');
        quizSection.style.display = 'block';
        resultSection.style.display = 'none';

        const progress = document.getElementById('progress');
        progress.style.width = `${(currentQuestionIndex / questions.length) * 100}%`;

        const qText = document.getElementById('question-text');
        qText.innerText = questions[currentQuestionIndex].q;

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        questions[currentQuestionIndex].options.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = option.text;
            btn.onclick = () => selectOption(option.score);
            optionsContainer.appendChild(btn);
        });
    }

    function selectOption(scoreObj) {
        for (let key in scoreObj) {
            if (totalScores[key] !== undefined) {
                totalScores[key] += scoreObj[key];
            }
        }

        currentQuestionIndex++;

        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('quiz-section').style.display = 'none';
        const resultSection = document.getElementById('result-section');
        resultSection.style.display = 'block';
        document.getElementById('progress').style.width = '100%';

        let highestGod = 'taiwan';
        let maxScore = -1;

        for (let key in totalScores) {
            if (totalScores[key] > maxScore) {
                maxScore = totalScores[key];
                highestGod = key;
            }
        }

        const resultGod = gods[highestGod];
        document.getElementById('god-name').innerText = resultGod.name;
        document.getElementById('god-origin').innerText = resultGod.origin;
        document.getElementById('god-desc').innerText = resultGod.desc;
    }

    function restartQuiz() {
        currentQuestionIndex = 0;
        totalScores = { taiwan: 0, china: 0, greece: 0, nordic: 0, maya: 0, india: 0 };
        loadQuestion();
    }

    window.onload = loadQuestion;
</script>

</body>
</html>
